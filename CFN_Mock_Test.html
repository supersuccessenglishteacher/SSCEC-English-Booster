<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CFN 12-Question Mega Quiz</title>
    <style>
        :root {
            --primary: #6366f1;
            --success: #22c55e;
            --danger: #ef4444;
            --bg: #f8fafc;
        }

        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); margin: 0; padding: 15px; display: flex; justify-content: center; }
        .quiz-card { max-width: 500px; width: 100%; background: white; padding: 25px; border-radius: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); border-bottom: 6px solid var(--primary); margin-top: 20px; }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .timer-circle { background: #fee2e2; color: var(--danger); padding: 8px 15px; border-radius: 50px; font-weight: bold; font-size: 18px; }
        .progress-bar { height: 8px; background: #e2e8f0; border-radius: 10px; margin-bottom: 20px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--primary); width: 0%; transition: 0.4s; }

        .question-box { display: none; text-align: center; }
        .question-box.active { display: block; animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .q-text { font-size: 20px; font-weight: bold; color: #1e293b; margin-bottom: 20px; line-height: 1.4; }
        .options-grid { display: grid; gap: 12px; }
        .opt-btn { background: white; border: 2px solid #e2e8f0; padding: 15px; border-radius: 15px; font-size: 16px; cursor: pointer; transition: 0.2s; font-weight: 500; }
        .opt-btn:hover { border-color: var(--primary); background: #f1f5f9; }
        .opt-btn.correct { background: #dcfce7; border-color: var(--success); color: #166534; }
        .opt-btn.wrong { background: #fee2e2; border-color: var(--danger); color: #991b1b; }

        .result-screen { display: none; text-align: center; padding: 20px; }
        .score-text { font-size: 48px; font-weight: 900; color: var(--primary); margin: 15px 0; }
        .whatsapp-btn { background: #25d366; color: white; padding: 15px 30px; border-radius: 50px; text-decoration: none; display: inline-block; font-size: 18px; font-weight: bold; margin-top: 20px; border: none; cursor: pointer; box-shadow: 0 4px 15px rgba(37, 211, 102, 0.3); }

        .footer { text-align: center; margin-top: 25px; font-size: 13px; color: #64748b; font-weight: 500; }
    </style>
</head>
<body>

<div class="quiz-card">
    <div class="header">
        <div style="color: var(--primary); font-weight: 800; font-size: 18px;">CFN MEGA QUIZ</div>
        <div class="timer-circle" id="timer">60s</div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>

    <div id="quiz-area">
        </div>

    <div class="result-screen" id="result-screen">
        <h2 id="congrats-msg">🎉 দারুন খেলেছো!</h2>
        <p>তোমার মোট স্কোর:</p>
        <div class="score-text" id="final-score">0 / 12</div>
        <button class="whatsapp-btn" onclick="sendToSir()">📩 স্যারকে জানাও (WhatsApp)</button>
    </div>

    <div class="footer">Super Success Computer Education<br>Bipul Sir: 8017247298</div>
</div>

<audio id="win-sound" src="https://assets.mixkit.co/active_storage/sfx/2013/2013-preview.mp3"></audio>
<audio id="lose-sound" src="https://assets.mixkit.co/active_storage/sfx/2018/2018-preview.mp3"></audio>

<script>
    const questions = [
        { q: "I ______ eating rice now.", a: "am", b: "is", c: "are", ans: "am", type: "CFN 1" },
        { q: "He ______ reading a book.", a: "am", b: "is", c: "are", ans: "is", type: "CFN 1" },
        { q: "They ______ playing football.", a: "am", b: "is", c: "are", ans: "are", type: "CFN 1" },
        { q: "I ______ go to market tomorrow.", a: "shall", b: "has", c: "am", ans: "shall", type: "CFN 2" },
        { q: "Ram ______ play cricket later.", a: "is", b: "will", c: "have", ans: "will", type: "CFN 2" },
        { q: "We ______ try our best.", a: "shall", b: "is", c: "has", ans: "shall", type: "CFN 2" },
        { q: "You ______ learn English.", a: "is", b: "will", c: "am", ans: "will", type: "CFN 2" },
        { q: "I have ______ my work.", a: "do", b: "did", c: "done", ans: "done", type: "CFN 3" },
        { q: "She ______ sung a song just now.", a: "has", b: "have", c: "is", ans: "has", type: "CFN 3" },
        { q: "They have ______ to school.", a: "go", b: "went", c: "gone", ans: "gone", type: "CFN 3" },
        { q: "We ______ eaten our lunch.", a: "has", b: "have", c: "will", ans: "have", type: "CFN 3" },
        { q: "Ram has ______ the broken pen.", a: "fix", b: "fixed", c: "fixing", ans: "fixed", type: "CFN 3" }
    ];

    let currentIdx = 0;
    let score = 0;
    let timeLeft = 60;
    let timer;

    const quizArea = document.getElementById('quiz-area');
    const timerEl = document.getElementById('timer');
    const progressEl = document.getElementById('progress');

    function initQuiz() {
        renderQuestion();
        startTimer();
    }

    function renderQuestion() {
        const q = questions[currentIdx];
        quizArea.innerHTML = `
            <div class="question-box active">
                <div style="color:var(--primary); font-size:12px; font-weight:bold; margin-bottom:5px;">${q.type}</div>
                <div class="q-text">${currentIdx + 1}. ${q.q}</div>
                <div class="options-grid">
                    <button class="opt-btn" onclick="check(this, '${q.a}')">${q.a}</button>
                    <button class="opt-btn" onclick="check(this, '${q.b}')">${q.b}</button>
                    <button class="opt-btn" onclick="check(this, '${q.c}')">${q.c}</button>
                </div>
            </div>
        `;
        progressEl.style.width = `${((currentIdx) / questions.length) * 100}%`;
    }

    function check(btn, choice) {
        const correct = questions[currentIdx].ans;
        const allBtns = document.querySelectorAll('.opt-btn');
        allBtns.forEach(b => b.style.pointerEvents = 'none');

        if (choice === correct) {
            score++;
            btn.classList.add('correct');
            document.getElementById('win-sound').play();
        } else {
            btn.classList.add('wrong');
            document.getElementById('lose-sound').play();
            // Show correct answer
            allBtns.forEach(b => { if(b.innerText === correct) b.classList.add('correct'); });
        }

        setTimeout(() => {
            currentIdx++;
            if (currentIdx < questions.length) {
                renderQuestion();
            } else {
                showResult();
            }
        }, 1200);
    }

    function startTimer() {
        timer = setInterval(() => {
            timeLeft--;
            timerEl.innerText = timeLeft + "s";
            if (timeLeft <= 0) { clearInterval(timer); showResult(); }
        }, 1000);
    }

    function showResult() {
        clearInterval(timer);
        quizArea.style.display = 'none';
        timerEl.style.display = 'none';
        document.querySelector('.progress-bar').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
        document.getElementById('final-score').innerText = `${score} / ${questions.length}`;
        
        if(score < 6) document.getElementById('congrats-msg').innerText = "আরো প্র্যাকটিস করো! 💪";
    }

    function sendToSir() {
        const msg = `হ্যালো স্যার, আমি ${score}/${questions.length} পেয়েছি CFN কুইজে।`;
        window.open(`https://wa.me/8017247298?text=${encodeURIComponent(msg)}`, '_blank');
    }

    initQuiz();
</script>
</body>
</html>
